<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Cadastrar Pessoa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center">

<h2>Cadastrar Pessoa</h2>

<a href="/pessoas"
class="btn btn-secondary">

Voltar

</a>

</div>

<hr>

<form th:action="@{/cadastrar}"
      th:object="${pessoa}"
      method="post"
      class="card p-4 shadow">

<input type="hidden" th:field="*{id}">

<div class="mb-3">

<label class="form-label">
Nome
</label>

<input type="text"
       th:field="*{nome}"
       class="form-control"
       required>

</div>

<div class="mb-3">

<label class="form-label">
Documento
</label>

<input type="text"
       th:field="*{documento}"
       class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Telefone
</label>

<input type="text"
       th:field="*{telefone}"
       class="form-control">

</div>

<button class="btn btn-success">
Salvar
</button>

</form>

</body>
</html>
