<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Pessoas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center">

<h2>Pessoas</h2>

<div class="d-flex gap-2">

<a href="/cadastrar" class="btn btn-success">
Cadastrar
</a>

<a href="/dashboard" class="btn btn-secondary">
Voltar
</a>

</div>

</div>

<hr>

<table class="table table-hover shadow align-middle">

<tr class="table-dark">
<th>Nome</th>
<th>Documento</th>
<th>Telefone</th>
<th>Ações</th>
</tr>

<tr th:each="p : ${pessoas}">

<td th:text="${p.nome}"></td>
<td th:text="${p.documento}"></td>
<td th:text="${p.telefone}"></td>

<td>

<div class="d-flex gap-2">

<a th:href="@{'/pessoas/editar/' + ${p.id}}"
   class="btn btn-warning btn-sm">

Editar

</a>

<form th:action="@{'/pessoas/excluir/' + ${p.id}}"
      method="post">

<button class="btn btn-danger btn-sm"
        onclick="return confirm('Deseja excluir esta pessoa?')">

Excluir

</button>

</form>

</div>

</td>

</tr>

</table>

</body>
</html>
