
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Controle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center">
  <h2>Controle de Entrada / Saída</h2>
  <a href="/dashboard" class="btn btn-secondary">Voltar</a>
</div>

<hr>

<table class="table table-hover shadow align-middle">

  <tr class="table-dark">
    <th>Nome</th>
    <th>Documento</th>
    <th>Status</th>
    <th>Ações</th>
  </tr>

  <tr th:each="p : ${pessoas}">

    <td th:text="${p.nome}"></td>
    <td th:text="${p.documento}"></td>

    <td>
      <span th:if="${statusMap[p.id] == 'DENTRO'}" class="badge bg-success fs-6">
        DENTRO
      </span>
      <span th:if="${statusMap[p.id] != 'DENTRO'}" class="badge bg-secondary fs-6">
        FORA
      </span>
    </td>

    <td>
      <div class="d-flex gap-2">

        <!-- Pessoa está FORA -->
        <form
                th:if="${statusMap[p.id] != 'DENTRO'}"
                th:action="@{'/controle/entrada/' + ${p.id}}"
                method="post">

          <button class="btn btn-success btn-sm">
            Entrou
          </button>

        </form>

        <!-- Pessoa está DENTRO -->
        <form
                th:if="${statusMap[p.id] == 'DENTRO'}"
                th:action="@{'/controle/saida/' + ${p.id}}"
                method="post">

          <button class="btn btn-danger btn-sm">
            Saiu
          </button>

        </form>

        <a th:href="@{'/controle/log/' + ${p.id}}"
           class="btn btn-outline-dark btn-sm">
          LOG
        </a>

      </div>
    </td>

  </tr>

</table>

</body>
</html>
